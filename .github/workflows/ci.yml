name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    format-check:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Restore dependencies
              run: dotnet restore LostieLauncher.slnx

            - name: Check formatting
              run: dotnet format LostieLauncher.slnx --verify-no-changes --verbosity diagnostic

    build-and-test:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Restore dependencies
              run: dotnet restore LostieLauncher.slnx

            - name: Build
              run: dotnet build LostieLauncher.slnx --no-restore --configuration Release

            - name: Test
              run: dotnet test LostieLauncher.slnx --no-build --configuration Release --verbosity normal
