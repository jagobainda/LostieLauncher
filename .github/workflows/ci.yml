name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    format-check:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Restore dependencies
              run: dotnet restore LostieLauncher.slnx

            - name: Check formatting
              run: dotnet format LostieLauncher.slnx --verify-no-changes --verbosity diagnostic

    build-and-test:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Restore dependencies
              run: dotnet restore LostieLauncher.slnx

            - name: Build
              run: dotnet build LostieLauncher.slnx --no-restore --configuration Release

            - name: Test
              run: dotnet test LostieLauncher.slnx --no-build --configuration Release --verbosity normal

    vulnerable-dependencies:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Restore dependencies
              run: dotnet restore LostieLauncher.slnx

            - name: Check for vulnerable NuGet packages
              shell: pwsh
              run: |
                  $report = dotnet list LostieLauncher.slnx package --vulnerable --include-transitive --format json --output-version 1 | Out-String
                  if ($LASTEXITCODE -ne 0) {
                      Write-Host $report
                      Write-Error "dotnet list package failed (exit code $LASTEXITCODE)."
                      exit 1
                  }
                  Write-Host $report

                  $json = $report | ConvertFrom-Json
                  $vulnerable = @(foreach ($project in $json.projects) {
                      foreach ($framework in $project.frameworks) {
                          foreach ($package in @($framework.topLevelPackages) + @($framework.transitivePackages)) {
                              if (@($package.vulnerabilities | Where-Object { $null -ne $_ }).Count -gt 0) {
                                  '{0}@{1} ({2})' -f $package.id, $package.resolvedVersion, $framework.framework
                              }
                          }
                      }
                  })

                  if ($vulnerable.Count -gt 0) {
                      Write-Error "Vulnerable NuGet packages detected:`n$($vulnerable -join "`n")"
                      exit 1
                  }

                  Write-Host 'No vulnerable NuGet packages detected.'
